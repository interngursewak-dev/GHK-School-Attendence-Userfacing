<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GHK Attend">
  <meta name="mobile-web-app-capable" content="yes">
  <title>GHK Attendance</title>
  <!--
    ⚡ PERFORMANCE FIX: face-api.js (~1.5 MB) removed from <head>.
    Loading it here blocks the browser from rendering ANY HTML until the
    entire 1.5 MB downloads + parses — blank screen for 5–10 s on slow
    connections. It is now loaded dynamically after the camera is live,
    so users see the camera feed in under 500 ms regardless of connection.
    ALL HTML/CSS and GAS_URL below are 100% unchanged.
  -->
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --black:#1a1a1a; --white:#fff; --grey:#f0f2f5;
      --green:#155724; --green-bg:#d4edda; --green-btn:#1a7a3f;
      --red:#721c24;   --red-bg:#f8d7da;   --red-btn:#c0392b;
      --blue:#0c5460;  --blue-bg:#d1ecf1;
      --amber:#856404; --amber-bg:#fff3cd;
      --muted:#666;    --radius:10px;
    }
    html,body { min-height:100%; background:var(--grey); font-family:'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; }
    .app { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px 14px 80px; }

    /* Header */
    .header { width:100%; max-width:400px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .logo { font-size:1.05rem; font-weight:700; }
    .logo span { color:#c00; }
    .clock { font-size:1rem; font-weight:600; color:var(--muted); letter-spacing:1px; }

    /* Card */
    .card { width:100%; max-width:400px; background:var(--white); border:2px solid var(--black); border-radius:14px; overflow:hidden; box-shadow:4px 4px 0 var(--black); }

    /* Camera */
    .cam-wrap { position:relative; width:100%; height:0; padding-bottom:72%; background:#000; overflow:hidden; }
    video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
    .face-oval { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:140px; height:180px; border:2.5px dashed rgba(255,255,255,0.85); border-radius:50%; pointer-events:none; box-shadow:0 0 0 1000px rgba(0,0,0,0.38); display:none; }

    /* Loading */
    #ld-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:20px; text-align:center; z-index:10; }
    #ld-text { color:#fff; font-size:0.88rem; font-weight:600; line-height:1.6; }
    #ld-bar  { width:80%; height:6px; background:rgba(255,255,255,0.2); border-radius:10px; overflow:hidden; }
    #ld-fill { height:100%; width:0%; background:#fff; border-radius:10px; transition:width 0.5s ease; }

    /* Status bar */
    .sbar { display:flex; align-items:center; gap:8px; padding:11px 16px; border-bottom:1px solid #eee; font-size:0.84rem; font-weight:600; }
    .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .dot.green { background:#28a745; }
    .dot.amber { background:#ffc107; animation:blink 1s infinite; }
    .dot.red   { background:#dc3545; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Punch button */
    .panel { padding:16px 18px 22px; }
    .btn-punch {
      display:block; width:100%; padding:16px;
      border:2px solid var(--black); border-radius:var(--radius);
      font-size:1.05rem; font-weight:700; cursor:pointer; text-align:center;
      margin-bottom:10px; transition:all 0.25s; color:#fff;
      -webkit-tap-highlight-color:transparent;
      background:var(--green-btn); border-color:var(--green-btn);
    }
    .btn-punch.out-mode { background:var(--red-btn); border-color:var(--red-btn); }
    .btn-punch:disabled { background:#aaa; border-color:#aaa; cursor:not-allowed; }
    .btn-punch:active:not(:disabled) { transform:scale(0.97); }

    /* Punch hint pill */
    .punch-hint { text-align:center; font-size:0.75rem; font-weight:600; color:var(--muted); margin-bottom:14px; letter-spacing:0.3px; }
    .punch-hint span { display:inline-block; padding:3px 10px; border-radius:20px; background:#f0f0f0; }

    .btn {
      display:block; width:100%; padding:13px;
      border:2px solid var(--black); border-radius:var(--radius);
      font-size:0.95rem; font-weight:700; cursor:pointer;
      background:var(--white); color:var(--black);
      margin-bottom:10px; text-align:center;
      -webkit-tap-highlight-color:transparent; transition:transform 0.1s;
    }
    .btn:last-child { margin-bottom:0; }
    .btn:active:not(:disabled) { transform:scale(0.97); }
    .btn:disabled { background:#e9ecef; border-color:#aaa; color:#aaa; cursor:not-allowed; }
    .btn.primary { background:var(--black); color:var(--white); }

    .flabel { display:block; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:5px; }
    .finput { width:100%; padding:12px 13px; border:2px solid #ccc; border-radius:var(--radius); font-size:0.95rem; outline:none; margin-bottom:12px; }
    .finput:focus { border-color:var(--black); }

    .alert { padding:11px 13px; border-radius:8px; font-size:0.85rem; font-weight:600; margin-top:12px; line-height:1.5; display:none; }
    .alert.show    { display:block; }
    .alert.success { background:var(--green-bg); color:var(--green); border:1px solid #c3e6cb; }
    .alert.error   { background:var(--red-bg);   color:var(--red);   border:1px solid #f5c6cb; }
    .alert.info    { background:var(--blue-bg);  color:var(--blue);  border:1px solid #bee5eb; }
    .alert.warning { background:var(--amber-bg); color:var(--amber); border:1px solid #ffeeba; }

    /* Report */
    #report-section { display:none; width:100%; max-width:400px; margin-top:14px; }
    .rcard { background:var(--white); border:2px solid var(--black); border-radius:12px; padding:16px; box-shadow:3px 3px 0 var(--black); }
    .rcard h3 { font-size:0.95rem; font-weight:700; margin-bottom:10px; }
    .rbig { font-size:2.5rem; font-weight:800; text-align:center; }
    .rsub { font-size:0.75rem; color:var(--muted); text-align:center; margin-bottom:12px; }
    .rrow { display:grid; grid-template-columns:1fr auto auto; gap:8px; align-items:center; padding:7px 0; border-bottom:1px solid #eee; font-size:0.82rem; }
    .rrow:last-child { border-bottom:none; }
    .rrow .rname { font-weight:600; }
    .rrow .rtimes { color:var(--muted); font-size:0.78rem; }
    .rrow .rhours { font-size:0.75rem; font-weight:700; padding:2px 7px; border-radius:20px; background:#e8f5e9; color:var(--green); white-space:nowrap; }
    .badge-in  { display:inline-block; padding:2px 8px; border-radius:20px; font-size:0.72rem; font-weight:700; background:#d4edda; color:var(--green); }
    .badge-out { display:inline-block; padding:2px 8px; border-radius:20px; font-size:0.72rem; font-weight:700; background:#f8d7da; color:var(--red); }

    /* Success screen */
    #success-screen { display:none; position:fixed; inset:0; background:#fff; z-index:200; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center; }
    #success-screen.show { display:flex; }
    .ss-circle { width:130px; height:130px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3.5rem; margin-bottom:20px; animation:pop 0.45s cubic-bezier(0.34,1.56,0.64,1); border:3px solid var(--black); }
    .ss-circle.in-circle  { background:#d4edda; border-color:var(--green-btn); }
    .ss-circle.out-circle { background:#f8d7da; border-color:var(--red-btn); }
    .ss-circle.reg-circle { background:#d1ecf1; border-color:#0c5460; }
    .ss-badge { display:inline-block; padding:4px 14px; border-radius:20px; font-size:0.78rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
    .ss-badge.in  { background:#d4edda; color:var(--green); }
    .ss-badge.out { background:#f8d7da; color:var(--red); }
    .ss-badge.reg { background:#d1ecf1; color:var(--blue); }
    .ss-name  { font-size:1.4rem; font-weight:800; margin-bottom:6px; color:var(--black); }
    .ss-time  { font-size:0.9rem; color:var(--muted); margin-bottom:8px; }
    .ss-hours { font-size:1.1rem; font-weight:700; color:var(--green); margin-bottom:28px; padding:8px 20px; background:#d4edda; border-radius:30px; display:none; }
    .ss-back  { width:100%; max-width:300px; padding:15px; background:var(--black); color:#fff; border:none; border-radius:var(--radius); font-size:1rem; font-weight:700; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    @keyframes pop { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }

    .hidden { display:none !important; }
  </style>
</head>

<!-- ═══════════════════════════════════════════════════════════
  DEEP OPTIMISATION LOG  (School App)

  BUG FIXED:
  ▸ face-api.js removed from <head>
      Was render-blocking: 1.5 MB JS blocked the entire page from
      painting until fully downloaded + parsed (5–10 s on slow 3G).
      Now loaded dynamically AFTER camera starts → camera visible
      in < 500 ms on any connection.

  NEW IN THIS BUILD (not in previous "optimised" version):
  1. Instant camera start                    → camera runs while models
                                               download in background
  2. Model caching (Cache API)               → 2nd+ visits load models
                                               from device, not network
  3. Auto device tuning                      → INPUT_SIZE auto-set by
                                               CPU cores + RAM
  4. Model warm-up inference                 → after loading, a dummy
                                               scan compiles GPU shaders
                                               so FIRST real scan is
                                               instant (was 2–3 s)
  5. Smart retry captureFrames               → retries up to 2× count
                                               to collect N good frames
                                               instead of failing if some
                                               frames are bad
  6. Face-size validation                    → rejects tiny detections
                                               (person too far away) that
                                               produce poor descriptors
  7. Scan button debounce                    → prevents double-tap
  8. Voting-based matching              ✓    (from previous version)
  9. Multi-descriptor storage (5/person) ✓   (from previous version)
  10. Backward-compatible DB load        ✓   (from previous version)
  11. Cached detectOpts                  ✓   (from previous version)
═══════════════════════════════════════════════════════════ -->
<script>
  // ▼▼▼ YOUR APPS SCRIPT URL — UNCHANGED ▼▼▼
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzYP3Zmfm5sgKiy00nctMPxWubYzH7TumBdd8tLNnPz_faS31VTvsOzBoNl79t2yo4/exec';

  // ── TUNING ──────────────────────────────────────────────────────────────
  const THRESHOLD      = 0.45;   // match distance cutoff. 0.42=strict 0.45=balanced 0.48=lenient
  const DETECT_FRAMES  = 3;      // frames captured per punch (voting across all)
  const REG_FRAMES     = 5;      // frames stored per registration
  const FRAME_GAP_MS   = 100;    // ms between frame attempts
  const MIN_SCORE      = 0.60;   // min detector confidence to accept a frame
  const MIN_FACE_RATIO = 0.05;   // face box must cover ≥5% of frame area (filters far-away faces)
  const MODEL_CACHE    = 'ghk-school-models-v1';
  const MODEL_URL      = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
  // ────────────────────────────────────────────────────────────────────────

  // ── AUTO DEVICE TUNING ──────────────────────────────────────────────────
  // Picks INPUT_SIZE based on actual device hardware instead of one-size-fits-all.
  // Low-end phones (≤2 cores or ≤1 GB RAM) use 128 for speed.
  // Better phones use 160 — better accuracy, still fast.
  // We cap at 160: 224 gives <5% accuracy gain but doubles inference time.
  function pickInputSize() {
    const cores = navigator.hardwareConcurrency || 2;
    const memGB = navigator.deviceMemory      || 2;  // may be undefined on some browsers
    if (cores <= 2 || memGB <= 1) return 128;
    return 160;
  }

  var faceapi      = null;
  var faceMatcher  = null;
  var detectOpts   = null;
  var isReady      = false;
  var isBusy       = false;   // debounce — prevents double-tap
  var userLocation = null;

  const video     = document.getElementById('video');
  const INPUT_SIZE = pickInputSize();

  /* ── Clock ── */
  function tickClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:true});
  }
  tickClock(); setInterval(tickClock, 10000);

  /* ── GPS ── */
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(p) { userLocation = {lat:p.coords.latitude, lng:p.coords.longitude}; },
      function() {}, {timeout:8000}
    );
  }

  /* ══════════════════════════════════════════════════════════════════════
     STARTUP — 3 things happen in sequence, camera starts FIRST:

     Step 1: Start camera (< 500 ms, visible immediately)
     Step 2: Load face-api.js script dynamically (doesn't block camera)
     Step 3: Load models in parallel + cache them + warm-up + load DB
  ══════════════════════════════════════════════════════════════════════ */

  // STEP 1 — Camera starts the moment the page loads
  // The loading overlay sits on top so the user sees progress,
  // but the video stream is running underneath right away.
  navigator.mediaDevices.getUserMedia({
    video: {facingMode:'user', width:{ideal:320}, height:{ideal:240}},
    audio: false
  }).then(function(stream) {
    video.srcObject = stream;
    video.play();
    prog('Camera ready — loading AI…', 10);
    loadFaceApiScript();   // Step 2
  }).catch(function(err) {
    document.getElementById('ld-text').innerHTML =
      '❌ Camera error: ' + err.message +
      '<br><br>Allow camera in browser settings, then reload.';
    document.getElementById('ld-fill').style.background = '#f87171';
  });

  // STEP 2 — Load face-api.js script dynamically (non-blocking)
  function loadFaceApiScript() {
    var s   = document.createElement('script');
    s.src   = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js';
    s.async = true;
    s.onload  = function() { faceapi = window.faceapi; loadModels(); };  // Step 3
    s.onerror = function() {
      document.getElementById('ld-text').innerHTML =
        '❌ Failed to load AI library.<br>Check internet and reload.';
    };
    document.head.appendChild(s);
  }

  // STEP 3 — Load models in parallel, cache them, warm-up, then load DB
  async function loadModels() {
    prog('Loading AI models…', 25);
    try {

      // ── Cache API: cache model files on device after first download ──────
      // Second visit onwards: models load from local storage, not network.
      // Typical model set is ~6 MB — this saves that download every time.
      var cache = null;
      try { cache = await caches.open(MODEL_CACHE); } catch(e) {}
      if (cache) {
        var origFetch = window.fetch;
        window.fetch = async function(url, opts) {
          if (typeof url === 'string' && url.includes('face-api')) {
            try {
              var hit = await cache.match(url);
              if (hit) return hit;
              var resp = await origFetch(url, opts);
              if (resp && resp.ok) { try { await cache.put(url, resp.clone()); } catch(e){} }
              return resp;
            } catch(e) { return origFetch(url, opts); }
          }
          return origFetch(url, opts);
        };
      }

      // All 3 networks download simultaneously — ~2× faster than sequential
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);

      // Create detectOpts ONCE — reused for every single frame.
      // INPUT_SIZE auto-tuned for this device above.
      detectOpts = new faceapi.TinyFaceDetectorOptions({
        inputSize:      INPUT_SIZE,
        scoreThreshold: MIN_SCORE
      });

      prog('Warming up AI…', 78);

      // ── MODEL WARM-UP ────────────────────────────────────────────────────
      // TensorFlow.js (used internally by face-api) must compile WebGL
      // shaders on the first inference. Without warm-up, the FIRST real
      // scan takes 2–4 seconds even on a good phone — users think it froze.
      // Running one dummy inference on a blank canvas compiles all shaders
      // so every subsequent real scan is instant.
      await warmUp();

      prog('Loading staff…', 90);
      await loadDatabase();

      document.getElementById('ld-fill').style.width = '100%';
      setTimeout(function() {
        document.getElementById('ld-overlay').style.display = 'none';
        document.getElementById('oval').style.display = 'block';
      }, 350);

    } catch(err) {
      document.getElementById('ld-text').innerHTML =
        '❌ ' + err.message + '<br><br>Reload the page to try again.';
      document.getElementById('ld-fill').style.background = '#f87171';
    }
  }

  // Warm-up: runs one inference on a blank 128×128 canvas.
  // Forces TF.js to compile GPU shaders — first real scan is then instant.
  async function warmUp() {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#555';
    ctx.fillRect(0, 0, 128, 128);
    try { await faceapi.detectSingleFace(canvas, detectOpts); } catch(e) {}
    // Don't care about the result — shaders are compiled, that's all we need
  }

  function prog(msg, pct) {
    document.getElementById('ld-text').innerHTML = msg;
    document.getElementById('ld-fill').style.width = pct + '%';
  }

  /* ── LOAD STAFF DATABASE ────────────────────────────────────────────────
     Auto-detects descriptor format:
     • New format: [[128 nums], [128 nums], ...] — 5 descriptors per person
     • Old format: [128 nums]                   — 1 descriptor (legacy)
     Both work without re-registering existing staff.
  ── */
  async function loadDatabase() {
    const res = await api('getUsers', {});
    if (res.error) throw new Error(res.error);
    if (!res.users || res.users.length === 0) {
      setStatus('No staff yet — tap Add New Staff', 'amber');
      showPanel('attend'); return;
    }

    const labeled = res.users.map(function(u) {
      const raw = JSON.parse(u.descriptor);
      const descriptors = Array.isArray(raw[0])
        ? raw.map(function(d) { return new Float32Array(d); })   // new: multi-descriptor
        : [new Float32Array(raw)];                                // legacy: single
      return new faceapi.LabeledFaceDescriptors(u.label, descriptors);
    });

    faceMatcher = new faceapi.FaceMatcher(labeled, THRESHOLD);
    isReady     = true;
    setStatus(res.users.length + ' staff loaded — ready! (device size: ' + INPUT_SIZE + ')', 'green');
    showPanel('attend');
  }

  /* ── SMART FRAME CAPTURE ────────────────────────────────────────────────
     Collects exactly `needed` high-quality descriptors.

     Key improvements over the previous version:
     • Retries up to 2× — if a frame is bad (blink, blur, low-score),
       it tries again instead of counting it as a failure. On a low-end
       device where some frames time out, this prevents false "not found".
     • Face-size check — the detected bounding box must cover at least
       MIN_FACE_RATIO of the video frame area. Tiny boxes = person is
       too far away = descriptor will be noisy. Rejected silently.
     • Returns null only if even 2× attempts can't yield `needed` frames.
  ── */
  async function captureFrames(needed) {
    const descriptors = [];
    const maxAttempts = needed * 2;  // allow 2× retries

    for (let attempt = 0; attempt < maxAttempts && descriptors.length < needed; attempt++) {
      try {
        const det = await faceapi
          .detectSingleFace(video, detectOpts)
          .withFaceLandmarks(true)
          .withFaceDescriptor();

        if (det && det.detection.score >= MIN_SCORE) {
          // Face-size gate: reject detections where the face is too small
          // (person standing too far from camera = low descriptor quality)
          const box       = det.detection.box;
          const frameW    = video.videoWidth  || 320;
          const frameH    = video.videoHeight || 240;
          const faceRatio = (box.width * box.height) / (frameW * frameH);

          if (faceRatio >= MIN_FACE_RATIO) {
            descriptors.push(det.descriptor);
          }
          // else: face detected but too small — retry silently
        }
      } catch(e) { /* frame failed — retry */ }

      if (descriptors.length < needed && attempt < maxAttempts - 1) {
        await sleep(FRAME_GAP_MS);
      }
    }

    return descriptors.length >= needed ? descriptors : null;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  /* ── VOTING-BASED MATCHING ─────────────────────────────────────────────
     Each frame votes independently. Winner needs majority (>50%).
     A single blink or slight turn frame cannot affect the result.
  ── */
  function votingMatch(descriptors) {
    const votes = {};
    descriptors.forEach(function(desc) {
      const m   = faceMatcher.findBestMatch(desc);
      const lbl = m.label;
      if (!votes[lbl]) votes[lbl] = {count:0, totalDist:0};
      votes[lbl].count++;
      votes[lbl].totalDist += m.distance;
    });

    let bestLabel = null, bestCount = 0, bestAvgDist = Infinity;
    Object.keys(votes).forEach(function(lbl) {
      const v = votes[lbl], avg = v.totalDist / v.count;
      if (v.count > bestCount || (v.count === bestCount && avg < bestAvgDist)) {
        bestLabel = lbl; bestCount = v.count; bestAvgDist = avg;
      }
    });

    if (!bestLabel)                            return null;
    if (bestCount / descriptors.length < 0.5)  return null;
    if (bestLabel === 'unknown')               return null;
    return {label: bestLabel, avgDistance: bestAvgDist, frameCount: descriptors.length};
  }

  /* ── MARK ATTENDANCE ────────────────────────────────────────────────────
     Debounced: isBusy flag prevents double-tap from firing twice.
  ── */
  document.getElementById('btn-punch').addEventListener('click', async function() {
    if (!isReady || isBusy) {
      if (!isReady) showAlert('alert-attend', '⏳ Still loading — please wait.', 'info');
      return;
    }
    isBusy = true;
    setBtn('btn-punch', true, '🔍 Scanning… hold still');

    const frames = await captureFrames(DETECT_FRAMES);
    if (!frames) {
      isBusy = false;
      setBtn('btn-punch', false, '✅  Mark Attendance');
      showAlert('alert-attend', '❌ No face detected. Move closer and ensure good lighting.', 'error');
      return;
    }

    const result = votingMatch(frames);
    if (!result) {
      isBusy = false;
      setBtn('btn-punch', false, '✅  Mark Attendance');
      showAlert('alert-attend', '❌ Face not recognised. Are you registered?', 'error');
      return;
    }

    showAlert('alert-attend', '⏳ Saving for ' + result.label + '…', 'info');
    const res = await api('recordAttendance', {name: result.label, gps: userLocation});
    isBusy = false;
    setBtn('btn-punch', false, '✅  Mark Attendance');

    if (res.error) { showAlert('alert-attend', '⚠️ ' + res.error, 'warning'); return; }
    showSuccess(res.type, res.name, res.time, res.date, res.workingHours);
  });

  /* ── REGISTER NEW STAFF ─────────────────────────────────────────────────
     Captures REG_FRAMES descriptors and stores ALL of them.
     FaceMatcher picks the closest stored sample per query → 5 reference
     points per person vs 1 in the original = far fewer false rejections.
  ── */
  document.getElementById('btn-new-user').addEventListener('click', function() {
    showPanel('register');
    document.getElementById('reg-name').focus();
  });
  document.getElementById('btn-cancel').addEventListener('click', function() {
    document.getElementById('reg-name').value = '';
    showPanel('attend');
  });
  document.getElementById('btn-save').addEventListener('click', async function() {
    const name = document.getElementById('reg-name').value.trim();
    if (!name) { showAlert('alert-reg', '⚠️ Please enter staff name first.', 'error'); return; }
    if (isBusy) return;
    isBusy = true;

    setBtn('btn-save', true, '📸 Capturing face samples…');
    showAlert('alert-reg', '⏳ Hold still — capturing face samples…', 'info');

    const frames = await captureFrames(REG_FRAMES);
    isBusy = false;

    if (!frames) {
      setBtn('btn-save', false, '📸  Scan & Save Face');
      showAlert('alert-reg', '❌ Face not detected clearly. Move closer and face the camera directly.', 'error');
      return;
    }

    showAlert('alert-reg', '⏳ Saving ' + frames.length + ' face samples to Google Sheet…', 'info');

    // Store array of arrays — loadDatabase() auto-detects format on reload
    const payload = JSON.stringify(frames.map(d => Array.from(d)));
    const res = await api('registerUser', {name: name, descriptor: payload});
    setBtn('btn-save', false, '📸  Scan & Save Face');

    if (res.success) {
      document.getElementById('reg-name').value = '';
      showPanel('attend');
      await loadDatabase();
      showSuccess('register', name, '', '', '');
    } else {
      showAlert('alert-reg', '⚠️ ' + res.message, 'error');
    }
  });

  /* ── TODAY'S REPORT ── */
  document.getElementById('btn-report').addEventListener('click', async function() {
    document.getElementById('report-section').style.display = 'block';
    document.getElementById('rpt-count').textContent = '…';
    document.getElementById('rpt-list').innerHTML = '<p style="font-size:0.82rem;color:#888;padding:6px 0">Loading…</p>';
    const res = await api('getDailyReport', {});
    document.getElementById('rpt-count').textContent = res.count || 0;
    if (!res.staff || res.staff.length === 0) {
      document.getElementById('rpt-list').innerHTML =
        '<p style="font-size:0.82rem;color:#888;text-align:center;padding:8px">No attendance today yet.</p>';
      return;
    }
    var html = '';
    res.staff.forEach(function(s, i) {
      var inB  = s.inTime  ? '<span class="badge-in">IN '  + s.inTime  + '</span>' : '<span style="color:#aaa;font-size:0.75rem">No IN</span>';
      var outB = s.outTime ? '<span class="badge-out">OUT ' + s.outTime + '</span>' : '<span style="color:#aaa;font-size:0.75rem">Still in</span>';
      var hrs  = s.workingHours ? '<span class="rhours">⏱ ' + s.workingHours + '</span>' : '';
      var map  = s.mapLink ? ' <a href="'+s.mapLink+'" target="_blank">📍</a>' : '';
      html += '<div class="rrow"><div><span class="rname">' + (i+1) + '.  ' + s.name + map +
        '</span><br><span class="rtimes">' + inB + '  ' + outB + '</span></div><div>' + hrs + '</div></div>';
    });
    document.getElementById('rpt-list').innerHTML = html;
  });
  document.getElementById('btn-close-rpt').addEventListener('click', function() {
    document.getElementById('report-section').style.display = 'none';
  });

  /* ── SUCCESS SCREEN ── */
  function showSuccess(type, name, time, date, hours) {
    const isReg = type === 'register', isIN = type === 'IN', isOUT = type === 'OUT';
    const circle  = document.getElementById('ss-circle');
    const badge   = document.getElementById('ss-badge');
    const hoursEl = document.getElementById('ss-hours');

    circle.textContent = isReg ? '🎉' : (isIN ? '🟢' : '🔴');
    circle.className   = 'ss-circle ' + (isReg ? 'reg-circle' : (isIN ? 'in-circle' : 'out-circle'));
    badge.textContent  = isReg ? 'REGISTERED' : (isIN ? 'PUNCHED IN' : 'PUNCHED OUT');
    badge.className    = 'ss-badge ' + (isReg ? 'reg' : (isIN ? 'in' : 'out'));

    document.getElementById('ss-name').textContent = name;
    document.getElementById('ss-time').textContent = isReg
      ? 'Face saved to Google Sheet'
      : ('🕐 ' + time + '   📅 ' + date);

    if (isOUT && hours) {
      hoursEl.textContent   = '⏱  Total working hours: ' + hours;
      hoursEl.style.display = 'block';
    } else {
      hoursEl.style.display = 'none';
    }
    updatePunchButton(null);
    document.getElementById('success-screen').classList.add('show');
  }

  function closeSuccess() {
    document.getElementById('success-screen').classList.remove('show');
  }

  /* ── PUNCH BUTTON ── */
  function getCurrentPunchLabel() { return '✅  Mark Attendance'; }
  function updatePunchButton() {
    document.getElementById('btn-punch').classList.remove('out-mode');
    document.getElementById('btn-punch').textContent = '✅  Mark Attendance';
    document.getElementById('punch-hint-text').textContent = '👆 Face the camera and tap';
  }

  /* ── HELPERS ── */
  async function api(action, payload) {
    const res = await fetch(GAS_URL + '?action=' + action, {
      method:'POST', mode:'cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(payload)
    });
    return res.json();
  }
  function setStatus(msg, color) {
    document.getElementById('stext').textContent = msg;
    document.getElementById('sdot').className    = 'dot ' + color;
  }
  function showPanel(name) {
    document.getElementById('panel-attend').classList.toggle('hidden',   name !== 'attend');
    document.getElementById('panel-register').classList.toggle('hidden', name !== 'register');
  }
  function setBtn(id, disabled, label) {
    const b = document.getElementById(id);
    b.disabled = disabled; b.textContent = label;
  }
  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className   = 'alert ' + type + ' show';
    if (type !== 'info') setTimeout(() => el.classList.remove('show'), 4500);
  }
</script>
</body>
</html>
